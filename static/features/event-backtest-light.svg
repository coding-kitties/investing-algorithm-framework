<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
<defs>
<style>
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes pl{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes tick{0%{transform:translateX(0)}100%{transform:translateX(-320px)}}
@keyframes order{from{opacity:0}to{opacity:1}}
@keyframes drawline{from{stroke-dashoffset:600}to{stroke-dashoffset:0}}
@keyframes movecursor{0%{transform:translateX(0)}100%{transform:translateX(560px)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.a0{opacity:0;animation:fi .5s .05s both}
.a1{opacity:0;animation:fi .5s .2s both}
.a2{opacity:0;animation:fi .5s .35s both}
.a3{opacity:0;animation:fi .5s .5s both}
.a4{opacity:0;animation:fi .5s .65s both}
.a5{opacity:0;animation:fi .5s .8s both}
.pl{animation:pl 1.5s infinite}
.tick{animation:tick 8s linear infinite}
.line{stroke-dasharray:600;stroke-dashoffset:600;animation:drawline 6s linear infinite}
.cursor{animation:movecursor 6s linear forwards}
.blink{animation:blink 1s infinite}
.o1{opacity:0;animation:order .6s 1.0s forwards}
.o2{opacity:0;animation:order .6s 1.8s forwards}
.o3{opacity:0;animation:order .6s 2.6s forwards}
.o4{opacity:0;animation:order .6s 3.4s forwards}
</style>
<pattern id="gp" width="22" height="22" patternUnits="userSpaceOnUse">
<circle cx="11" cy="11" r=".55" fill="#e2e8f0"/>
</pattern>
<radialGradient id="glow" gradientUnits="userSpaceOnUse" cx="600" cy="300" r="600">
<stop offset="0" stop-color="#7c3aed" stop-opacity=".09"/>
<stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
</radialGradient>
<linearGradient id="hdr" gradientUnits="userSpaceOnUse" x1="0" y1="60" x2="0" y2="120">
<stop offset="0" stop-color="#0f172a"/>
<stop offset="1" stop-color="#5b21b6"/>
</linearGradient>
<linearGradient id="chartfill" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="0" y2="1">
<stop offset="0" stop-color="#7c3aed" stop-opacity=".25"/>
<stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
</linearGradient>
<clipPath id="chartclip"><rect x="60" y="195" width="600" height="200"/></clipPath>
<clipPath id="bookclip"><rect x="700" y="180" width="440" height="240" rx="10"/></clipPath>
</defs>

<!-- BACKGROUND -->
<rect width="1200" height="600" fill="#ffffff" rx="14"/>
