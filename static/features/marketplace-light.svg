<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" width="1200" height="520">
<defs>
<style>
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes pl{0%,100%{opacity:.55}50%{opacity:1}}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.a0{opacity:0;animation:fi .5s .05s both}
.a1{opacity:0;animation:fi .5s .2s both}
.a2{opacity:0;animation:fi .5s .35s both}
.a3{opacity:0;animation:fi .5s .5s both}
.a4{opacity:0;animation:fi .5s .65s both}
.a5{opacity:0;animation:fi .5s .8s both}
.a6{opacity:0;animation:fi .5s .95s both}
.a7{opacity:0;animation:fi .5s 1.1s both}
.a8{opacity:0;animation:fi .5s 1.25s both}
.a9{opacity:0;animation:fi .5s 1.4s both}
.pl{animation:pl 2.4s infinite}
.fl{animation:fl 4s ease-in-out infinite;transform-origin:center}
</style>
<pattern id="gp" width="22" height="22" patternUnits="userSpaceOnUse">
<circle cx="11" cy="11" r=".55" fill="#e2e8f0"/>
</pattern>
<radialGradient id="glow" gradientUnits="userSpaceOnUse" cx="600" cy="260" r="500">
<stop offset="0" stop-color="#0891b2" stop-opacity=".09"/>
<stop offset="1" stop-color="#0891b2" stop-opacity="0"/>
</radialGradient>
<radialGradient id="fglow" gradientUnits="userSpaceOnUse" cx="600" cy="270" r="260">
<stop offset="0" stop-color="#0891b2" stop-opacity=".22"/>
<stop offset=".6" stop-color="#0891b2" stop-opacity=".05"/>
<stop offset="1" stop-color="#0891b2" stop-opacity="0"/>
</radialGradient>
<linearGradient id="hdr" gradientUnits="userSpaceOnUse" x1="0" y1="60" x2="0" y2="120">
<stop offset="0" stop-color="#0f172a" stop-opacity="1"/>
<stop offset="1" stop-color="#0e7490" stop-opacity="1"/>
</linearGradient>
<linearGradient id="fcard" gradientUnits="userSpaceOnUse" x1="380" y1="180" x2="820" y2="420">
<stop offset="0" stop-color="#ecfeff" stop-opacity="1"/>
<stop offset="1" stop-color="#ecfeff" stop-opacity="1"/>
</linearGradient>
<linearGradient id="border" gradientUnits="userSpaceOnUse" x1="380" y1="180" x2="820" y2="420">
<stop offset="0" stop-color="#0891b2" stop-opacity=".5"/>
<stop offset=".5" stop-color="#0891b2" stop-opacity=".9"/>
<stop offset="1" stop-color="#0891b2" stop-opacity=".5"/>
</linearGradient>
</defs>

<!-- BACKGROUND -->
<rect width="1200" height="520" fill="#ffffff" rx="14"/>
<rect width="1200" height="520" fill="url(#gp)" rx="14"/>
<rect width="1200" height="520" fill="url(#glow)" rx="14"/>

<!-- HEADER -->
<g class="a0">
<rect x="40" y="40" width="11" height="11" rx="2" fill="#0891b2"/>
<text x="60" y="50" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#0891b2" letter-spacing="2" font-weight="700">MARKETPLACE INTEGRATION PARTNERS</text>
</g>
<text class="a1" x="40" y="100" font-family="system-ui,-apple-system,sans-serif" font-size="38" font-weight="700" fill="url(#hdr)">Marketplace Integration</text>
<text class="a2" x="40" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#475569">Discover, deploy and monetize battle-tested trading strategies through our partner network.</text>

<!-- AMBIENT GLOW behind featured card -->
<rect x="320" y="170" width="560" height="280" fill="url(#fglow)"/>

<!-- FEATURED PARTNER CARD - FINTERION -->
<g class="a5">
<!-- glow behind -->
<rect x="316" y="186" width="568" height="248" rx="20" fill="#0891b2" opacity=".08"/>
<!-- card -->
<rect x="320" y="190" width="560" height="240" rx="18" fill="url(#fcard)" stroke="url(#border)" stroke-width="1.5"/>

<!-- "FEATURED PARTNER" pill -->
<rect x="344" y="212" width="128" height="22" rx="11" fill="#ecfeff" stroke="#0891b2" stroke-opacity=".4" stroke-width="1"/>
<circle class="pl" cx="358" cy="223" r="3" fill="#0891b2"/>
<text x="368" y="227" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#0891b2" letter-spacing="1.5" font-weight="700">FEATURED PARTNER</text>

<!-- Finterion logo -->
<image x="336" y="244" width="220" height="52" href="data:image/svg+xml;base64," preserveAspectRatio="xMinYMid meet"/>

<!-- Tagline -->
<text x="344" y="324" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#0f172a" font-weight="500">The home for systematic traders.</text>
<text x="344" y="346" font-family="system-ui,-apple-system,sans-serif" font-size="12.5" fill="#475569">Publish your bot, share your edge, and reach</text>
<text x="344" y="362" font-family="system-ui,-apple-system,sans-serif" font-size="12.5" fill="#475569">capital allocators &amp; retail investors.</text>

<!-- Feature pills -->
<g transform="translate(344, 384)">
<rect x="0" y="0" width="92" height="22" rx="11" fill="#ecfeff" stroke="#0891b2" stroke-opacity=".25"/>
<text x="46" y="14.5" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#0891b2" text-anchor="middle" font-weight="600">Strategy Hub</text>

<rect x="100" y="0" width="92" height="22" rx="11" fill="#ecfeff" stroke="#0891b2" stroke-opacity=".25"/>
<text x="146" y="14.5" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#0891b2" text-anchor="middle" font-weight="600">Live Tracking</text>

<rect x="200" y="0" width="92" height="22" rx="11" fill="#ecfeff" stroke="#0891b2" stroke-opacity=".25"/>
<text x="246" y="14.5" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#0891b2" text-anchor="middle" font-weight="600">Monetization</text>
</g>

<!-- Right decorative chart -->
<g transform="translate(660, 232)" opacity=".9">
<rect x="0" y="0" width="200" height="160" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
<text x="14" y="22" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#64748b" letter-spacing="1.5" font-weight="700">EQUITY CURVE</text>
<polyline points="14,130 38,118 62,124 86,100 110,92 134,72 158,80 186,46" fill="none" stroke="#0891b2" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
<polyline points="14,130 38,118 62,124 86,100 110,92 134,72 158,80 186,46 186,150 14,150" fill="#0891b2" opacity=".08"/>
<line x1="14" y1="150" x2="186" y2="150" stroke="#e2e8f0"/>
<circle cx="186" cy="46" r="3" fill="#0891b2"/>
<text x="14" y="146" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#94a3b8">Jan</text>
<text x="174" y="146" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#94a3b8">Dec</text>
<text x="14" y="62" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#059669">+42.8%</text>
<text x="14" y="76" font-family="system-ui,-apple-system,sans-serif" font-size="8.5" fill="#475569">YTD return</text>
</g>
</g>

<!-- BOTTOM ROW: marketplace value props -->
<g class="a7">
<rect x="40" y="464" width="1120" height="36" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>

<g transform="translate(72, 482)">
<circle cx="0" cy="0" r="3" fill="#0891b2"/>
<text x="12" y="4" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">One-click strategy publishing</text>
</g>

<g transform="translate(660, 482)">
<circle cx="0" cy="0" r="3" fill="#7c3aed"/>
<text x="12" y="4" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Live performance attribution</text>
</g>

<g transform="translate(940, 482)">
<circle cx="0" cy="0" r="3" fill="#d97706"/>
<text x="12" y="4" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Revenue sharing &amp; licensing</text>
</g>
</g>
</svg>
