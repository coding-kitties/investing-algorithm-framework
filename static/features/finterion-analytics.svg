<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" role="img" aria-label="Finterion analytics: browse, compare, chat, share thousands of backtests">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fafbff"/>
      <stop offset="1" stop-color="#eef1fb"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#3aa8ff"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#3aa8ff"/>
    </linearGradient>
    <linearGradient id="area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1a2540" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- backdrop -->
  <rect width="720" height="340" fill="url(#bg)"/>

  <!-- main dashboard card -->
  <g filter="url(#shadow)">
    <rect x="20" y="24" width="500" height="252" rx="14" fill="#ffffff" stroke="#e3e7f1"/>
    <!-- top bar -->
    <rect x="20" y="24" width="500" height="32" rx="14" fill="#f6f7fb"/>
    <rect x="20" y="40" width="500" height="16" fill="#f6f7fb"/>
    <circle cx="36" cy="40" r="4" fill="#ff6b6b"/>
    <circle cx="50" cy="40" r="4" fill="#ffbe55"/>
    <circle cx="64" cy="40" r="4" fill="#3ddc97"/>
    <text x="84" y="44" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#7d869c">finterion.com · momentum-research</text>

    <!-- left sidebar: run list -->
    <rect x="36" y="72" width="140" height="190" rx="8" fill="#f6f7fb" stroke="#e7eaf3"/>
    <text x="48" y="90" font-family="ui-monospace, monospace" font-size="9" fill="#7d869c" letter-spacing="0.5">2,847 BACKTESTS</text>
    <!-- filter pills -->
    <rect x="48" y="98" width="50" height="14" rx="7" fill="#ece6ff" stroke="#d8cdff"/>
    <text x="73" y="108" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#5b3bd6" text-anchor="middle" font-weight="600">sharpe&gt;1.5</text>
    <rect x="102" y="98" width="40" height="14" rx="7" fill="#e6f1ff" stroke="#cfe1ff"/>
    <text x="122" y="108" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#1f6fd0" text-anchor="middle" font-weight="600">btc/eth</text>

    <!-- run rows -->
    <g font-family="Inter, system-ui, sans-serif" font-size="9" fill="#2b3245">
      <rect x="48" y="120" width="116" height="22" rx="5" fill="#ffffff" stroke="#e7eaf3"/>
      <text x="54" y="129">momentum_v2</text>
      <text x="156" y="129" text-anchor="end" fill="#16a34a" font-weight="700">+38%</text>
      <text x="54" y="138" fill="#9aa3b8" font-size="7.5">2024-Q3 · 12d</text>

      <rect x="48" y="146" width="116" height="22" rx="5" fill="#f5f0ff" stroke="#d8cdff"/>
      <text x="54" y="155" font-weight="600">breakout_sol</text>
      <text x="156" y="155" text-anchor="end" fill="#16a34a" font-weight="700">+26%</text>
      <text x="54" y="164" fill="#9aa3b8" font-size="7.5">2024-Q3 · 9d</text>

      <rect x="48" y="172" width="116" height="22" rx="5" fill="#ffffff" stroke="#e7eaf3"/>
      <text x="54" y="181">mean_revert</text>
      <text x="156" y="181" text-anchor="end" fill="#16a34a" font-weight="700">+11%</text>
      <text x="54" y="190" fill="#9aa3b8" font-size="7.5">2024-Q2 · 30d</text>

      <rect x="48" y="198" width="116" height="22" rx="5" fill="#ffffff" stroke="#e7eaf3"/>
      <text x="54" y="207">grid_arb_v3</text>
      <text x="156" y="207" text-anchor="end" fill="#dc2626" font-weight="700">-4%</text>
      <text x="54" y="216" fill="#9aa3b8" font-size="7.5">2024-Q2 · 14d</text>

      <rect x="48" y="224" width="116" height="22" rx="5" fill="#ffffff" stroke="#e7eaf3"/>
      <text x="54" y="233">ema_cross_a</text>
      <text x="156" y="233" text-anchor="end" fill="#16a34a" font-weight="700">+7%</text>
      <text x="54" y="242" fill="#9aa3b8" font-size="7.5">2024-Q2 · 21d</text>
    </g>

    <!-- main chart area -->
    <g>
      <!-- KPIs -->
      <g font-family="Inter, system-ui, sans-serif">
        <rect x="190" y="72" width="74" height="40" rx="6" fill="#f6f7fb" stroke="#e7eaf3"/>
        <text x="198" y="84" font-size="7.5" fill="#7d869c" letter-spacing="0.4">SHARPE</text>
        <text x="198" y="102" font-size="14" font-weight="700" fill="#2b3245">2.14</text>

        <rect x="270" y="72" width="74" height="40" rx="6" fill="#f6f7fb" stroke="#e7eaf3"/>
        <text x="278" y="84" font-size="7.5" fill="#7d869c" letter-spacing="0.4">CAGR</text>
        <text x="278" y="102" font-size="14" font-weight="700" fill="#16a34a">+38.2%</text>

        <rect x="350" y="72" width="74" height="40" rx="6" fill="#f6f7fb" stroke="#e7eaf3"/>
        <text x="358" y="84" font-size="7.5" fill="#7d869c" letter-spacing="0.4">MAX DD</text>
        <text x="358" y="102" font-size="14" font-weight="700" fill="#2b3245">-9.4%</text>

        <rect x="430" y="72" width="74" height="40" rx="6" fill="#f6f7fb" stroke="#e7eaf3"/>
        <text x="438" y="84" font-size="7.5" fill="#7d869c" letter-spacing="0.4">TRADES</text>
        <text x="438" y="102" font-size="14" font-weight="700" fill="#2b3245">412</text>
      </g>

      <!-- chart -->
      <rect x="190" y="122" width="314" height="140" rx="6" fill="#fafbff" stroke="#e7eaf3"/>
      <!-- grid -->
      <g stroke="#eef0f7" stroke-width="1">
        <line x1="190" y1="158" x2="504" y2="158"/>
        <line x1="190" y1="192" x2="504" y2="192"/>
        <line x1="190" y1="226" x2="504" y2="226"/>
      </g>
      <!-- equity area -->
      <path d="M198,240 L222,228 L246,232 L272,214 L298,218 L324,196 L350,200 L378,176 L404,182 L432,156 L460,142 L488,134 L500,138 L500,256 L198,256 Z" fill="url(#area)"/>
      <path d="M198,240 L222,228 L246,232 L272,214 L298,218 L324,196 L350,200 L378,176 L404,182 L432,156 L460,142 L488,134 L500,138" fill="none" stroke="url(#line)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- baseline (benchmark) -->
      <path d="M198,238 L500,210" fill="none" stroke="#9aa3b8" stroke-width="1.2" stroke-dasharray="3 3"/>

      <text x="200" y="138" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#2b3245">Equity curve · momentum_v2</text>
      <text x="495" y="138" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#9aa3b8" text-anchor="end">vs. BTC buy &amp; hold</text>
    </g>
  </g>

  <!-- AI chat / annotation side card -->
  <g filter="url(#shadow)">
    <rect x="540" y="44" width="160" height="170" rx="12" fill="#ffffff" stroke="#e3e7f1"/>
    <!-- header -->
    <circle cx="556" cy="62" r="8" fill="url(#brand)"/>
    <text x="556" y="65" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="700" fill="#ffffff" text-anchor="middle">AI</text>
    <text x="570" y="60" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#2b3245">Research Agent</text>
    <circle cx="688" cy="60" r="3" fill="#16a34a"/>

    <!-- ai bubble -->
    <rect x="556" y="78" width="132" height="48" rx="8" fill="#f5f0ff" stroke="#e1d6ff"/>
    <text x="564" y="91" font-family="Inter, system-ui, sans-serif" font-size="8.5" fill="#2b3245">Momentum_v2 beat the</text>
    <text x="564" y="103" font-family="Inter, system-ui, sans-serif" font-size="8.5" fill="#2b3245">benchmark by <tspan font-weight="700" fill="#5b3bd6">+22%</tspan>.</text>
    <text x="564" y="115" font-family="Inter, system-ui, sans-serif" font-size="8.5" fill="#2b3245">Top driver: BTC breakout</text>
    <text x="564" y="124" font-family="Inter, system-ui, sans-serif" font-size="8.5" fill="#2b3245">on 2024-08-12.</text>

    <!-- user bubble -->
    <rect x="556" y="134" width="132" height="22" rx="8" fill="url(#brand)"/>
    <text x="564" y="149" font-family="Inter, system-ui, sans-serif" font-size="8.5" fill="#ffffff">Compare with breakout_sol?</text>

    <!-- input -->
    <rect x="552" y="180" width="136" height="22" rx="6" fill="#f6f7fb" stroke="#e7eaf3"/>
    <text x="560" y="195" font-family="ui-monospace, monospace" font-size="8" fill="#9aa3b8">Ask anything…</text>
    <rect x="676" y="184" width="8" height="14" fill="url(#brand)" rx="2"/>
  </g>

  <!-- share / team strip -->
  <g filter="url(#shadow)">
    <rect x="540" y="226" width="160" height="50" rx="12" fill="#ffffff" stroke="#e3e7f1"/>
    <text x="552" y="244" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#2b3245">Share with team</text>
    <circle cx="556" cy="262" r="8" fill="#7c5cff"/>
    <text x="556" y="265" font-family="Inter, system-ui, sans-serif" font-size="7.5" font-weight="700" fill="#ffffff" text-anchor="middle">M</text>
    <circle cx="572" cy="262" r="8" fill="#3aa8ff"/>
    <text x="572" y="265" font-family="Inter, system-ui, sans-serif" font-size="7.5" font-weight="700" fill="#ffffff" text-anchor="middle">A</text>
    <circle cx="588" cy="262" r="8" fill="#16a34a"/>
    <text x="588" y="265" font-family="Inter, system-ui, sans-serif" font-size="7.5" font-weight="700" fill="#ffffff" text-anchor="middle">J</text>
    <circle cx="604" cy="262" r="8" fill="#f6f7fb" stroke="#e7eaf3"/>
    <text x="604" y="265" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#7d869c" text-anchor="middle">+4</text>
    <rect x="624" y="254" width="64" height="16" rx="8" fill="url(#brand)"/>
    <text x="656" y="265" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="700" fill="#ffffff" text-anchor="middle">Invite link</text>
  </g>

  <!-- caption strip -->
  <g font-family="Inter, system-ui, sans-serif" font-size="10" fill="#5b6478">
    <text x="20" y="304" font-weight="700" fill="#2b3245">Explore</text>
    <text x="76" y="304">·</text>
    <text x="86" y="304" font-weight="700" fill="#2b3245">Compare</text>
    <text x="148" y="304">·</text>
    <text x="158" y="304" font-weight="700" fill="#2b3245">Annotate</text>
    <text x="222" y="304">·</text>
    <text x="232" y="304" font-weight="700" fill="#2b3245">Share</text>
    <text x="20" y="322" fill="#7d869c">Thousands of backtests, on the go — powered by an AI research analyst.</text>
  </g>
</svg>
